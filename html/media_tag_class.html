<!DOCTYPE html>
<html>
<head>
    <title>Media Tags, Iframe and Map Example</title>
</head>
<body>

    <h2>Audio Tag</h2>
    <audio controls>
        <source src="./song.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>


    <h2>Video Tag</h2>
    <video width="400" height="300" controls>
        <source src="./video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <br><br>

    <h2>Iframe Tag (YouTube Video)</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/sWk9lpkGAfs?si=03_SFfCXq3FqHT6V" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h2>Google Map</h2>
    <iframe
        src="https://maps.google.com/maps?q=Bangalore&t=&z=13&ie=UTF8&iwloc=&output=embed"
        width="600"
        height="400">
    </iframe>

</body>
</html>
