<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables</title>
  </head>
  <body>
    <table border="1" cellspacing="10px" cellpadding="10px">
      <tr>
        <td colspan="2">1</td>
      </tr>
      <tr>
        <td>2</td>
        <td>3</td>
      </tr>
      <tr>
        <td rowspan="2">4</td>
        <td>5</td>
      </tr>
      <tr>
        <td>6</td>
      </tr>
    </table>



     <table border="1" cellspacing="10px" cellpadding="10px">
      <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
      </tr>
      <tr>
        <td rowspan="2">4</td>
        <td colspan="2">5</td>
      </tr>
      <tr>
        <td>6</td>
        <td>7</td>
      </tr>





      <table border="1" cellspacing="10px" cellpadding="10px">
      <tr>
        <td>1</td>
        <td rowspan="3  ">2</td>
        <td>3</td>
      </tr>
      <tr>
        <td rowspan="2">4</td>
        <td colspan="2">5</td>
      </tr>
      
     
    </table>
  </body>
</html>
